name: airs-env
version: 1.0.0

entrypoint:
  command: uvicorn api.main:app --host 0.0.0.0 --port 7860

endpoints:
  reset:
    method: POST
    path: /reset

  step:
    method: POST
    path: /step

  state:
    method: GET
    path: /state

  tasks:
    method: GET
    path: /tasks

  grader:
    method: POST
    path: /grader

  baseline:
    method: GET
    path: /baseline
